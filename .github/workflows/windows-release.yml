# Windows Release pipeline for Gridex
# ---------------------------------------------------------------------
# Triggers on any git tag matching `v*.*.*` (semver). Delegates build +
# pack to the phase 01 PowerShell scripts in windows/scripts/ so the
# workflow stays a thin orchestration layer (single source of truth for
# MSBuild flags lives in build-unpackaged.ps1).
#
# Produces an unsigned Velopack release uploaded to the GitHub Release
# for the pushed tag. Signing is added in phase 05 via SignPath.
# ---------------------------------------------------------------------

name: Windows Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to pack (e.g. 0.1.0). Only used for manual runs."
        required: false
        default: "0.0.0-manual"

permissions:
  contents: write   # needed for Release creation via vpk upload github

env:
  # vpk 0.0.1298 targets net9.0; allow running on any newer .NET runtime
  # installed on the runner (setup-dotnet pins 9.0.x below, but leave the
  # roll-forward on as a safety net for future vpk updates).
  DOTNET_ROLL_FORWARD: Major

jobs:
  release:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history; vpk may inspect git metadata

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Extract version from tag
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart('v')
          } else {
            # workflow_dispatch fallback
            $version = "${{ github.event.inputs.version }}"
            $tag = "v$version"
          }
          Write-Host "Tag: $tag / Version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install vpk CLI
        shell: pwsh
        run: .\windows\scripts\install-vpk-tool.ps1

      # Gridex.vcxproj hardcodes C:\vcpkg\installed\x64-windows\{include,lib}
      # and links against sqlite3/libpq/libmariadb/openssl/hiredis. GitHub
      # runners ship vcpkg at C:\vcpkg but do NOT pre-install these packages,
      # so we install them explicitly. Cache the installed tree to avoid
      # re-building openssl/libpq from source on every run.
      - name: Cache vcpkg installed tree
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          # Bump v-suffix when changing the package list below so the
          # cache invalidates cleanly.
          key: vcpkg-x64-windows-v4-sqlite3-libpq-libmariadb-openssl-hiredis-nlohmann-httplib-mongocxx-libssh2

      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & C:\vcpkg\vcpkg.exe install `
            sqlite3 libpq libmariadb openssl hiredis `
            nlohmann-json cpp-httplib `
            mongo-cxx-driver libssh2 `
            --triplet x64-windows `
            --recurse
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed" }

      - name: Build unpackaged (Release x64)
        shell: pwsh
        run: .\windows\scripts\build-unpackaged.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Velopack pack
        shell: pwsh
        run: .\windows\scripts\pack-velopack.ps1 -Version ${{ steps.ver.outputs.version }}

      # TODO(phase 05): insert SignPath signing step here, between pack
      # and upload, once the SignPath Foundation cert is approved.
      # The step will submit windows/Releases/*.nupkg + Setup.exe to the
      # SignPath webhook and download signed artifacts back before upload.

      - name: Upload Setup.exe to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only upload Gridex-stable-Setup.exe — users download and
          # run it directly. The nupkg/json/RELEASES files are Velopack
          # auto-update artifacts not needed when auto-update is disabled.
          $setup = "windows\Releases\Gridex-stable-Setup.exe"
          if (-not (Test-Path $setup)) {
            throw "Setup.exe not found at $setup"
          }
          gh release create ${{ steps.ver.outputs.tag }} `
            $setup `
            --title "${{ steps.ver.outputs.tag }}" `
            --notes "Gridex ${{ steps.ver.outputs.tag }} Windows Installer" `
            --latest
